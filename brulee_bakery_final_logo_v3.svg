<svg width="100%" viewBox="0 0 400 400" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Brûlée Bakery Logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Round badge logo for Brûlée Bakery in yellow pastel</desc>

  

  <circle cx="200" cy="200" r="185" fill="#fdf3c0" style="fill:rgb(253, 243, 192);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="#c9a227" stroke-width="2.5" style="fill:none;stroke:rgb(201, 162, 39);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#c9a227" stroke-width="1" style="fill:none;stroke:rgb(201, 162, 39);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="200" cy="200" r="158" fill="none" stroke="#e8d070" stroke-width="0.6" style="fill:none;stroke:rgb(232, 208, 112);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- BB monogram -->
  <text x="200" y="155" font-family="'Playfair Display', serif" font-size="15" font-weight="700" fill="#7a5c00" text-anchor="middle" letter-spacing="0.3em" style="fill:rgb(122, 92, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Playfair Display&quot;, serif;font-size:15px;font-weight:700;text-anchor:middle;dominant-baseline:auto">BB</text>

  <!-- Decorative lines flanking BB -->
  <line x1="125" y1="163" x2="170" y2="163" stroke="#c9a227" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="230" y1="163" x2="275" y2="163" stroke="#c9a227" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Main name -->
  <text x="200" y="222" font-family="'Playfair Display', serif" font-size="44" font-weight="700" fill="#7a5c00" text-anchor="middle" letter-spacing="0.06em" style="fill:rgb(122, 92, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Playfair Display&quot;, serif;font-size:44px;font-weight:700;text-anchor:middle;dominant-baseline:auto">BRÛLÉE</text>

  <!-- Rule below name -->
  <line x1="105" y1="236" x2="295" y2="236" stroke="#c9a227" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- BAKERY -->
  <text x="200" y="257" font-family="'DM Sans', sans-serif" font-size="13" font-weight="400" fill="#a07c10" text-anchor="middle" letter-spacing="0.32em" style="fill:rgb(160, 124, 16);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">BAKERY</text>

  <!-- Diamond -->
  <polygon points="200,278 205,286 200,294 195,286" fill="#c9a227" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>